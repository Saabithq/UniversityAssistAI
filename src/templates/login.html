{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="color: var(--primary);">Welcome Back</h1>
            <p style="color: var(--secondary);">Login to your account</p>
        </div>

        <form action="/login" method="post">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="text" name="textfield" class="form-control" style="padding-left: 2.5rem;"
                        placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="password" name="textfield2" class="form-control" style="padding-left: 2.5rem;"
                        placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Login <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
            <p style="color: var(--secondary); font-size: 0.9rem;">
                Don't have an account? <a href="/register" style="color: var(--primary); font-weight: 600;">Register
                    here</a>
            </p>
        </div>
    </div>

    <div style="text-align: center; margin-top: 1rem;">
        <a href="/forgot_password" style="color: var(--secondary); font-size: 0.9rem; text-decoration: none;">Forgot
            Password?</a>
    </div>
</div>
{% endblock %}
