{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="color: var(--primary);">Reset Password</h1>
            <p style="color: var(--secondary);">Enter your details to reset your password.</p>
        </div>

        <form action="/reset_password" method="post">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="text" name="username" class="form-control" style="padding-left: 2.5rem;"
                        placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-phone"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="text" name="phone" class="form-control" style="padding-left: 2.5rem;"
                        placeholder="Enter your phone number" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">New Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="password" name="new_password" class="form-control" style="padding-left: 2.5rem;"
                        placeholder="New Password" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--secondary);"></i>
                    <input type="password" name="confirm_password" class="form-control" style="padding-left: 2.5rem;"
                        placeholder="Confirm Password" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Reset Password
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
            <p style="color: var(--secondary); font-size: 0.9rem;">
                Remembered your password? <a href="/login" style="color: var(--primary); font-weight: 600;">Login
                    here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
