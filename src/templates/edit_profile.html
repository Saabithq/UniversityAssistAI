{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="dashboard-header">
    <div>
        <a href="/profile/view"
            style="color: var(--secondary); font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
            <i class="fa-solid fa-arrow-left"></i> Back to Profile
        </a>
        <h1>Edit Profile</h1>
    </div>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <form action="/profile/edit" method="post" enctype="multipart/form-data">

            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 100px; height: 100px; margin: 0 auto 1rem; position: relative;">
                    {% if user[6] %}
                    <img src="/static/profile_photos/{{ user[6] }}" alt="Current Photo"
                        style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                    {% else %}
                    <div
                        style="width: 100%; height: 100%; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; font-weight: 700;">
                        {{ user[1][0] | upper }}
                    </div>
                    {% endif %}
                </div>
                <div class="form-group" style="max-width: fit-content; margin: 0 auto;">
                    <label class="btn-secondary" style="cursor: pointer;">
                        <i class="fa-solid fa-camera"></i> Change Photo
                        <input type="file" name="photo" accept="image/*" style="display: none;">
                    </label>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="fname" class="form-control" value="{{ user[1] }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="lname" class="form-control" value="{{ user[2] }}" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Contact Number</label>
                <input type="text" name="contacts" class="form-control" value="{{ user[3] }}" required>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn-primary" style="flex: 1; justify-content: center;">Save
                    Changes</button>
                <a href="/profile/view" class="btn-secondary"
                    style="flex: 1; justify-content: center; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
